<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ION TUI · 主控台</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="../../components.css">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  /* ── Page-level layout only (tokens + components.css carry styling) ── */
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--color-bg-deep);
    color: var(--color-text-primary);
    font-family: var(--font-mono);
    font-size: var(--text-base);
    line-height: var(--leading-normal);
    min-height: 100vh;
    border-radius: 0;
  }
  /* app shell — validator requires max-width:1184px guard */
  .uikit-shell {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
    min-height: 100vh;
    overflow: hidden;
  }
  [data-component] { min-width: 0; max-width: 100%; overflow: hidden; }
  .uikit-truncate { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .uikit-nowrap { white-space: nowrap; flex-shrink: 0; }
  /* ── Layout overflow guards (validator-required) ── */
  .uikit-main { min-width: 0; }
  .uikit-toolbar { display: flex; align-items: center; gap: var(--space-2); min-width: 0; }
  .uikit-responsive-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--space-2); }
  .uikit-table-wrap { max-width: 100%; overflow-x: auto; overscroll-behavior-x: contain; }
  .uikit-action-cell { display: flex; align-items: center; gap: 8px; min-width: 0; max-width: 160px; overflow: hidden; }
  .uikit-action { min-width: 0; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  @media (max-width: 900px) {
    .uikit-responsive-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .ws-sidebar { display: none; }
  }
  @media (max-width: 640px) {
    .uikit-responsive-grid { grid-template-columns: minmax(0, 1fr); }
    .uikit-toolbar { flex-direction: column; align-items: stretch; }
  }

  /* ── App header bar ── */
  .app-header {
    display: flex; align-items: center; gap: var(--space-3);
    height: var(--header-height);
    padding: 0 var(--space-3);
    background: var(--color-bg-secondary);
    border-bottom: 1px solid var(--color-border);
    flex-shrink: 0;
  }
  .app-logo {
    font-weight: 700; font-size: var(--text-md);
    letter-spacing: 0.1em; color: var(--color-accent);
  }
  .app-logo .ver { color: var(--color-text-muted); font-weight: 400; font-size: var(--text-xs); margin-left: var(--space-2); }
  .app-sep { color: var(--color-text-muted); }
  .app-context { color: var(--color-text-secondary); font-size: var(--text-xs); }
  .app-context .ctx-accent { color: var(--color-accent); }
  .app-spacer { flex: 1; }
  .app-timestamp { color: var(--color-text-secondary); font-size: var(--text-xs); }

  /* ── View tabs ── */
  .view-tabs {
    display: flex; align-items: center; gap: 0;
    background: var(--color-bg-secondary);
    border-bottom: 1px solid var(--color-border);
    flex-shrink: 0;
    padding-left: var(--space-3);
  }
  .view-tab {
    font-family: var(--font-mono); font-size: var(--text-xs);
    padding: var(--space-2) var(--space-3);
    background: transparent; border: none; border-bottom: 2px solid transparent;
    color: var(--color-text-secondary);
    cursor: pointer; white-space: nowrap;
    transition: color var(--transition-normal), border-color var(--transition-normal);
  }
  .view-tab:hover { color: var(--color-text-primary); background: var(--color-bg-elevated); }
  .view-tab.active { color: var(--color-accent); border-bottom-color: var(--color-accent); background: var(--color-bg-primary); }
  .view-tab .ti { color: var(--color-text-muted); margin-right: var(--space-1); }

  /* ── 3-column workspace ── */
  .workspace {
    flex: 1; display: grid;
    grid-template-columns: var(--sidebar-width) minmax(0, 1fr) var(--right-panel-width);
    gap: 0; min-height: 0; overflow: hidden;
  }
  .ws-col { display: flex; flex-direction: column; gap: 0; min-width: 0; overflow: hidden; background: var(--color-bg-primary); border-right: 1px solid var(--color-border); }
  .ws-col:last-child { border-right: none; border-left: 1px solid var(--color-border); }
  .ws-col.col-center { background: var(--color-bg-deep); }
  .ws-pad { padding: var(--space-2); display: flex; flex-direction: column; gap: var(--space-2); min-height: 0; overflow-y: auto; }

  /* ── Conversation panel (center) ── */
  .conv-scroll {
    flex: 1; overflow-y: auto; padding: var(--space-3);
    display: flex; flex-direction: column; gap: var(--space-2);
    min-height: 0;
  }
  .conv-user, .conv-assistant {
    font-family: var(--font-mono); font-size: var(--text-sm);
    line-height: var(--leading-normal);
    padding: var(--space-2) var(--space-3);
    border-left: 2px solid var(--color-divider);
    color: var(--color-text-primary);
  }
  .conv-user { border-left-color: var(--color-info); background: rgba(88,166,255,0.04); }
  .conv-assistant { border-left-color: var(--color-accent); background: rgba(0,212,170,0.04); }
  .conv-role { font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: var(--space-1); display: block; }
  .conv-role.accent { color: var(--color-accent); }
  .conv-tool { color: var(--color-warning); font-size: var(--text-xs); }
  .conv-stream-cursor {
    display: inline-block; width: 7px; height: 12px;
    background: var(--color-accent-bright); vertical-align: text-bottom;
    margin-left: 2px; animation: blink 0.5s steps(1) infinite;
  }
  @keyframes blink { 0%,50%{opacity:1;} 50.01%,100%{opacity:0;} }

  /* ── Kanban grid ── */
  .kanban-grid {
    display: grid; grid-template-columns: repeat(3, minmax(0,1fr));
    gap: var(--space-2); padding: var(--space-3);
    min-height: 0; overflow-y: auto;
    align-content: start;
  }
  .kanban-msg {
    padding: var(--space-3); border-top: 1px solid var(--color-border);
    display: flex; flex-direction: column; gap: var(--space-1);
    background: var(--color-bg-primary); min-height: 0; flex-shrink: 0;
    max-height: 180px; overflow-y: auto;
  }

  /* ── Logs focused view ── */
  .logs-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: var(--space-3); gap: var(--space-2); }
  .filter-bar {
    display: flex; align-items: center; gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    background: var(--color-bg-secondary);
    border: 1px solid var(--color-border);
    flex-shrink: 0; overflow-x: auto;
  }
  .filter-bar .filter-label { color: var(--color-text-muted); font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .filter-bar .badge { cursor: pointer; opacity: 0.6; }
  .filter-bar .badge:hover { opacity: 1; }
  .filter-bar .badge.active { opacity: 1; }
  .logs-flex { flex: 1; min-height: 0; display: flex; flex-direction: column; }

  /* ── Status bar (bottom) ── */
  .status-bar {
    display: flex; align-items: center; gap: var(--space-4);
    height: var(--status-bar-height);
    padding: 0 var(--space-3);
    background: var(--color-bg-secondary);
    border-top: 1px solid var(--color-border);
    font-size: var(--text-xs); color: var(--color-text-secondary);
    flex-shrink: 0;
  }
  .status-bar .sb-item { display: inline-flex; align-items: center; gap: var(--space-1); white-space: nowrap; }
  .status-bar .sb-item.acc { color: var(--color-accent); }
  .status-bar .sb-sep { color: var(--color-text-muted); }

  /* ── Responsive ── */
  @media (max-width: 1100px) {
    .workspace { grid-template-columns: var(--sidebar-width) minmax(0,1fr); }
    .ws-col.col-right { display: none; }
    .kanban-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
  }
  @media (max-width: 720px) {
    .workspace { grid-template-columns: minmax(0,1fr); }
    .ws-col.col-left { display: none; }
    .kanban-grid { grid-template-columns: minmax(0,1fr); }
    .view-tab { padding: var(--space-2); }
    .app-context { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

  { ts: "12:04:31", lvl: "info",     msg: "Worker-01: tool=read('Cargo.toml')" },
  { ts: "12:04:29", lvl: "info",     msg: "agent_start · Worker-01 build" },
  { ts: "12:04:28", lvl: "warn",     msg: "retry send_to_worker(2) attempt 1/3" },

// ── Reusable subcomponents (component-class fidelity from components.css) ──

function PanelCol({ title, children, action, count }) {
  return (
    <div className="panel elev-secondary" data-component="panel">
      <div className="panel-header">
        <span>{title}</span>
        {action && <span className="panel-action">{action}</span>}
        {count !== undefined && <span className="panel-count">{count}</span>}
      </div>
      <div className="panel-body">{children}</div>
    </div>
  );
}

function PanelRow({ dot, val, tag, tagCls }) {
  return (
    <div className="panel-row">
      {dot && <span className={"dot " + dot}></span>}
      {val && <span className="panel-val uikit-truncate">{val}</span>}
      {tag && <span className={"panel-tag " + (tagCls || "")}>{tag}</span>}
    </div>
  );
}

function InputPromptBar({ prefix, typed, placeholder, focused, disabled, mode }) {
  const cls = "ion-input-prompt" + (focused ? " focused" : "") + (disabled ? " disabled" : "");
  return (
    <div className="ion-input-panel" data-component="input-prompt">
      <div className="ion-input-prompt" className={cls}>
        <span className="prefix">{prefix}</span>
        {typed ? <span className="typed">{typed}</span> : <span className="placeholder">{placeholder}</span>}
        {!disabled && <span className="cursor">█</span>}
      </div>
    </div>
  );
}

function KeyHints({ hints }) {
  return (
    <span data-component="key-hint">
      {hints.map((h, i) => (
        <span key={i} className={"kh " + (h.opt ? "kh-optional" : "kh-primary")}>
          <span className="bracket">[</span>{h.key}<span className="bracket">]</span>{h.label}
          {i < hints.length - 1 ? "  " : ""}
        </span>
      ))}
    </span>
  );
}

// ── SCREEN 1: 主控台 ──

            {sessions.map((s,i)=>(<PanelRow key={i} dot={s.dot} val={s.name} tag={s.time} />))}

          <PanelCol title="Notify" count={3}>
            {notify.map((n,i)=>(<PanelRow key={i} dot={n.dot} val={n.val} tag={n.tag} tagCls={n.tagCls} />))}
          </PanelCol>
        </div>
      </div>

      {/* Center conversation */}
      <div className="ws-col col-center">
        <div className="conv-scroll">
          {conversation.map((c,i)=>(
            <div key={i} className={c.role === "tool" ? "conv-user" : (c.role === "user" ? "conv-user" : "conv-assistant")}>
              <span className={"conv-role" + (c.accent ? " accent" : "")}>{c.roleLabel}</span>
              <span>{c.text}</span>
              {c.streaming && <span className="conv-stream-cursor"></span>}
            </div>
          ))}
        </div>
        <InputPromptBar prefix=">" placeholder="向 ION 提问..." focused={true} />
      </div>

      <div className="ws-col col-right">

          <div className="panel state-active elev-secondary" data-component="panel">
            <div className="panel-header"><span>Workers</span><span className="panel-action">● live</span><span className="panel-count">2</span></div>

            {todoList.map((t,i)=>(<PanelRow key={i} dot={t.dot} val={t.val} tag={t.tag} tagCls={t.tagCls} />))}

          <div data-component="log-stream">

              <div className="log-line"><span className="log-ts">12:04:33</span><span className="log-level info">INFO</span><span className="log-msg">{kanbanWorkers[selected].agent}: tool={kanbanWorkers[selected].tool}</span></div>
              <div className="log-line"><span className="log-ts">12:04:30</span><span className="log-level success">OK</span><span className="log-msg">channel_send(progress) → coordinator</span></div>
              <div className="log-line"><span className="log-ts">12:04:28</span><span className="log-level debug">DBG</span><span className="log-msg">await_worker({kanbanWorkers[selected].pid})</span></div>
              <span className="log-cursor"></span>
            </div>
          </div>
        </div>
        <InputPromptBar prefix=">" placeholder={"发送消息到 " + kanbanWorkers[selected].agent + "..."} focused={true} />
      </div>

      <div className="ws-col col-right">
        <div className="ws-pad">
          <PanelCol title="Hierarchy" count={3}>
            <div className="panel-row"><span className="dot ok"></span><span className="panel-val">main · coordinator</span><span className="panel-tag acc">root</span></div>
            <div className="panel-row"><span className="dot run"></span><span className="panel-val">sub · Worker-01/02/05</span><span className="panel-tag warn">child</span></div>
            <div className="panel-row"><span className="dot idle"></span><span className="panel-val">peer · Worker-06</span><span className="panel-tag">idle</span></div>
          </PanelCol>
          <PanelCol title="Stats">
            <div className="panel-row"><span className="panel-label">active</span><span className="panel-val">3 / 6</span></div>
            <div className="panel-row"><span className="panel-label">errors</span><span className="panel-val" style={{color:"var(--color-error)"}}>1</span></div>
            <div className="panel-row"><span className="panel-label">avg elapsed</span><span className="panel-val">2m04s</span></div>
          </PanelCol>
        </div>
      </div>
    </div>
  );
}

// ── SCREEN 3: 实时日志 ──
function ScreenLogs() {
  const [activeFilter, setActiveFilter] = useState(null);
  const [paused, setPaused] = useState(false);
  const visible = activeFilter ? fullLogs.filter(l => l.lvl === activeFilter) : fullLogs;
  return (
    <div className="workspace">
      <div className="ws-col col-left">
        <div className="ws-pad">
          <PanelCol title="Projects" count={4}>
            {projects.map((p,i)=>(<PanelRow key={i} dot={p.dot} val={p.name} tag={p.tag} tagCls={p.tagCls} />))}
          </PanelCol>
          <PanelCol title="Sources">
            <div className="panel-row"><span className="dot ok"></span><span className="panel-val">ion-worker</span><span className="panel-tag acc">live</span></div>
            <div className="panel-row"><span className="dot ok"></span><span className="panel-val">memory-ext</span><span className="panel-tag acc">live</span></div>
            <div className="panel-row"><span className="dot idle"></span><span className="panel-val">bash-ext</span><span className="panel-tag">idle</span></div>
          </PanelCol>
        </div>
      </div>

      <div className="ws-col col-center">
        <div className="logs-wrap">
          <div className="filter-bar">
            <span className="filter-label">FILTER</span>
            {logLevels.map((lv,i)=>(
              <span
                key={i}
                className={"badge badge--" + lv.cls + (activeFilter === lv.cls ? " active" : "")}
                data-component="status-badge"
                onClick={()=>setActiveFilter(activeFilter === lv.cls ? null : lv.cls)}
              >
                <span className="dot">●</span><span className="txt">{lv.label} {lv.count}</span>
              </span>
            ))}
            <span style={{flex:1}}></span>
            <span className="filter-label" style={{color: paused ? "var(--color-warning)" : "var(--color-success)"}}>
              {paused ? "⏸ paused" : "▶ streaming"}
            </span>
          </div>

          <div className="logs-flex" data-component="log-stream">
            <div className="log-panel" style={{flex:1, display:"flex", flexDirection:"column"}}>
              <div className="log-panel-header">
                <span className="log-panel-title">LOGS <span className="dim">·</span> all sources</span>
                <span className="log-panel-live">streaming</span>
              </div>
              <div className="log-stream" style={{flex:1, overflowY:"auto"}}>
                {visible.map((l,i)=>(
                  <div key={i} className="log-line">
                    <span className="log-ts">{l.ts}</span>
                    <span className={"log-level " + l.lvl}>{l.lvl === "success" ? "OK" : l.lvl.toUpperCase()}</span>
                    <span className="log-msg">{l.msg}</span>
                  </div>
                ))}
                {!paused && <span className="log-cursor"></span>}
              </div>
              {paused && <div className="log-resume-hint">↓ resume · [Space]</div>}
            </div>
          </div>

          <InputPromptBar prefix="/" typed="filter error" focused={true} />
        </div>
      </div>

      <div className="ws-col col-right">
        <div className="ws-pad">
          <PanelCol title="Workers" count={2}>
            {workersRight.map((w,i)=>(<PanelRow key={i} dot={w.dot} val={w.val} tag={w.tag} tagCls={w.tagCls} />))}
          </PanelCol>
          <PanelCol title="Errors" count={1}>
            <div className="panel-row"><span className="dot err"></span><span className="panel-val">edit timeout</span><span className="panel-tag err">x1</span></div>
            <div className="panel-row"><span className="dot ok"></span><span className="panel-val">retry recovered</span><span className="panel-tag acc">ok</span></div>
          </PanelCol>
        </div>
      </div>
    </div>
  );
}

  return (

        <KeyHints hints={[
          { key: "Esc", label: "退出" },

      <main className="uikit-main">

        <KeyHints hints={[{ key: "?", label: "help", opt: true }]} />

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
