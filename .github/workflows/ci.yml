name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'dashboard/**'
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

# Cancel old runs when a new commit is pushed to the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --bin ion --bin ion-worker --bin agent-demo

      - name: Clippy
        run: cargo clippy --lib -- -D warnings
        continue-on-error: true

      - name: Format check
        run: cargo fmt -- --check
        continue-on-error: true

      - name: Unit tests (ion lib)
        run: cargo test --lib

      - name: Provider tests
        run: cargo test -p ion-provider

      - name: CLI session entry integration test
        run: bash tests/session_entries_ci.sh

      - name: Integration tests (Rust)
        run: cargo test --tests 2>&1 || echo "(some tests may need manager)"

      - name: Scenario 1 test (quick execution)
        run: |
          echo 'hello' | timeout 30 ./target/debug/ion -p --model faux --provider faux 2>&1 | head -5
        env:
          ION_FAUX_REPLY: 'Hello from faux!'

      - name: Scenario 2 test (host orchestration)
        run: |
          echo 'say hi' | timeout 30 ./target/debug/ion --host --agent build --model faux --provider faux 2>&1 | head -5

      - name: Scenario 3 test (serve mode)
        run: |
          timeout 5 ./target/debug/ion serve &
          sleep 2
          # Verify socket exists
          test -S ~/.ion/host.sock && echo 'socket OK' || echo 'no socket'
          kill %1 2>/dev/null || true
