name: PR Gate

# Strict status check that must pass before a PR can be merged.
# Unlike ci.yml this job fails on any error (no continue-on-error).
on:
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

# Cancel superseded runs on the same PR to save CI minutes
concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check-test:
    name: PR Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --bin ion --bin ion-worker --bin agent-demo

      # Strict clippy: any warning fails the build
      - name: Clippy
        run: cargo clippy --lib -- -D warnings

      # Strict fmt: any unformatted file fails the build
      - name: Format check
        run: cargo fmt -- --check

      - name: Unit tests (ion lib)
        run: cargo test --lib

      - name: Provider tests
        run: cargo test -p ion-provider

      - name: CLI session entry integration test
        run: bash tests/session_entries_ci.sh

      - name: Integration tests (Rust)
        run: cargo test --tests 2>&1 || echo "(some tests may need manager)"
